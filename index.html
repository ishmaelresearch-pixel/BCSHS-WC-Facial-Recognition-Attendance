<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attend.Net | Biometric Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0A0A0A] text-gray-100 font-sans antialiased overflow-hidden">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-gray-800 bg-[#0A0A0A] flex flex-col z-50">
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(139,92,246,0.5)]">
                    <i data-lucide="scan-face" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Attend.Net</h1>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2">
                <button data-view="dashboard" class="nav-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="font-medium">Dashboard</span>
                </button>
                <button data-view="students" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-medium">Students</span>
                </button>
                <button data-view="scanner" class="nav-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200">
                    <i data-lucide="camera" class="w-5 h-5"></i>
                    <span class="font-medium">Scan Attendance</span>
                </button>
            </nav>

            <div class="p-6 border-t border-gray-800">
                <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-800">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1">System Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="text-xs text-gray-300">Biometric Engine Active</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="app-viewport" class="flex-1 relative overflow-y-auto">
            <!-- Content will be injected here -->
        </main>
    </div>

    <!-- Notification Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
